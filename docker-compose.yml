services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eventapp
      POSTGRES_PASSWORD: eventapp
      POSTGRES_DB: eventapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://eventapp:eventapp@db:5432/eventapp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
