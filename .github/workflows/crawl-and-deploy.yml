name: Crawl & Deploy

# Crawl ALL sources, export the static snapshot, commit it, build the static
# Next.js export and deploy it to GitHub Pages — all in ONE job. Splitting crawl
# and deploy breaks: a GITHUB_TOKEN commit does not trigger an `on: push` deploy
# (anti-recursion), so the site would go stale.

on:
  schedule:
    # 04:17 / 16:17 UTC ≈ 06:17 / 18:17 Berlin (CEST), ±1h over DST.
    - cron: "17 4,16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write # commit the exported JSON
  pages: write # deploy to Pages
  id-token: write # OIDC for deploy-pages

# Don't cancel an in-flight crawl/deploy; let it finish.
concurrency:
  group: crawl-deploy
  cancel-in-progress: false

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: eventapp
          POSTGRES_PASSWORD: eventapp
          POSTGRES_DB: eventapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://eventapp:eventapp@localhost:5432/eventapp

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Playwright Chromium
        # No browser cache per Playwright CI docs — install fresh each run.
        run: python -m playwright install --with-deps chromium

      - name: Export snapshot (full sync against fresh DB)
        working-directory: backend
        env:
          NOMINATIM_CONTACT: ${{ secrets.NOMINATIM_CONTACT }}
        run: python -m app.scripts.export_snapshot

      - name: Commit snapshot if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: snapshot aktualisiert [skip ci]"
          file_pattern: frontend/public/data/*.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Node 20 ist seit April 2026 EOL; 22 ist aktuelle LTS.
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_STATIC_BUILD: "true"
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
